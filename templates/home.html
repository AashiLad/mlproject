<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Prediction</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#0f172a;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            padding:30px;
        }

        .container{
            width:100%;
            max-width:900px;
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            box-shadow:0 0 25px rgba(0,0,0,0.5);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#38bdf8;
        }

        form{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
        }

        .form-group{
            display:flex;
            flex-direction:column;
        }

        label{
            margin-bottom:8px;
            font-size:14px;
            color:#cbd5e1;
        }

        input,
        select{
            padding:12px;
            border:none;
            border-radius:10px;
            background:#334155;
            color:white;
            font-size:14px;
        }

        input:focus,
        select:focus{
            outline:none;
            border:2px solid #38bdf8;
        }

        .btn-container{
            grid-column:span 2;
            text-align:center;
            margin-top:10px;
        }

        button{
            background:#38bdf8;
            color:white;
            border:none;
            padding:14px 35px;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
            transition:.3s;
        }

        button:hover{
            background:#0ea5e9;
            transform:scale(1.03);
        }

        .result{
            margin-top:30px;
            text-align:center;
            font-size:24px;
            color:#22c55e;
            font-weight:bold;
        }

        @media(max-width:768px){

            form{
                grid-template-columns:1fr;
            }

            .btn-container{
                grid-column:span 1;
            }
        }
        .result-box{
            margin-top:30px;
        }

        .summary-card{
            margin-top:20px;
            background:#0f172a;
            padding:20px;
            border-radius:12px;
        }

        .summary-card h3{
            margin-bottom:10px;
            color:#38bdf8;
        }

        .summary-card p{
            margin:8px 0;
        }

        .risk-box{
            margin-top:25px;
        }

        .risk-box h3{
            margin-bottom:10px;
            color:#38bdf8;
        }

        .progress{
            width:100%;
            background:#334155;
            height:30px;
            border-radius:20px;
            overflow:hidden;
        }

        .progress-bar{
            height:100%;
            background:#ef4444;
            text-align:center;
            line-height:30px;
            font-weight:bold;
            color:white;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Customer Churn Prediction System</h1>

    <form action="/predictdata" method="post">

        <div class="form-group">
            <label>Gender</label>
            <select name="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Senior Citizen</label>
            <select name="SeniorCitizen">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="form-group">
            <label>Partner</label>
            <select name="Partner">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div class="form-group">
            <label>Dependents</label>
            <select name="Dependents">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div class="form-group">
            <label>Tenure</label>
            <input type="number" name="tenure" required>
        </div>

        <div class="form-group">
            <label>Monthly Charges</label>
            <input type="number" step="0.01" name="MonthlyCharges" required>
        </div>

        <div class="form-group">
            <label>Total Charges</label>
            <input type="number" step="0.01" name="TotalCharges" required>
        </div>

        <div class="form-group">
            <label>Phone Service</label>
            <select name="PhoneService">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div class="form-group">
            <label>Multiple Lines</label>
            <select name="MultipleLines">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
                <option value="No phone service">No phone service</option>
            </select>
        </div>

        <div class="form-group">
            <label>Internet Service</label>
            <select name="InternetService">
                <option value="DSL">DSL</option>
                <option value="Fiber optic">Fiber optic</option>
                <option value="No">No</option>
            </select>
        </div>

        <div class="form-group">
            <label>Contract</label>
            <select name="Contract">
                <option value="Month-to-month">Month-to-month</option>
                <option value="One year">One year</option>
                <option value="Two year">Two year</option>
            </select>
        </div>

        <div class="form-group">
            <label>Paperless Billing</label>
            <select name="PaperlessBilling">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div class="form-group">
            <label>Payment Method</label>
            <select name="PaymentMethod">
                <option value="Electronic check">Electronic check</option>
                <option value="Mailed check">Mailed check</option>
                <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
                <option value="Credit card (automatic)">Credit card (automatic)</option>
            </select>
        </div>

        <div class="btn-container">
            <button type="submit">
                Predict Churn
            </button>
        </div>

    </form>

    {% if results %}
    <div class="result">
        {{ results }}
    </div>

    <div class="result-box">
    
        <h2>{{ results }}</h2>
    
        <div class="summary-card">
    
            <h3>Customer Summary</h3>
    
            <p><strong>Tenure:</strong> {{ tenure }} months</p>
    
            <p><strong>Monthly Charges:</strong> ₹{{ monthly }}</p>
    
            <p><strong>Total Charges:</strong> ₹{{ total }}</p>
    
        </div>
    
        <div class="risk-box">
    
            <h3>Churn Risk Score</h3>
    
            <div class="progress">
    
                <div class="progress-bar" style="width: {{ probability }}%;">
    
                    {{ probability }}%
    
                </div>
    
            </div>
    
        </div>
    
    </div>


    {% endif %}

</div>

</body>
</html>
